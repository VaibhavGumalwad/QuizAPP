spring.application.name=exam-platform
spring.profiles.active=prod

# Database configuration - will be overridden by environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/exam_platform}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT configuration
jwt.secret=${JWT_SECRET:examPlatformSecretKeyForJWTTokenGenerationAndValidation2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini API configuration
gemini.api.key=${GEMINI_API_KEY:your-api-key}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}

# Server configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# CORS configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://your-cloudfront-domain.cloudfront.net}