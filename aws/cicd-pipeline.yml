AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Native CI/CD Pipeline for Exam Platform with EKS and ECS'

Parameters:
  ProjectName:
    Type: String
    Default: exam-platform
  DeploymentTarget:
    Type: String
    Default: ECS
    AllowedValues: [ECS, EKS]
    Description: Choose deployment target - ECS or EKS

Resources:
  # CodeCommit Repository
  CodeRepository:
    Type: AWS::CodeCommit::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-repo
      RepositoryDescription: Exam Platform Source Code Repository

  # ECR Repositories
  BackendECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  FrontendECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-frontend
      ImageScanningConfiguration:
        ScanOnPush: true

  # S3 Bucket for Pipeline Artifacts
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-pipeline-artifacts-${AWS::AccountId}-${AWS::Region}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # CodeBuild Service Role
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:GetAuthorizationToken
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - sts:AssumeRole
                Resource: '*'

  # CodeBuild Project for Backend
  BackendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-backend-build
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: IMAGE_REPO_NAME
            Value: !Sub ${ProjectName}-backend
          - Name: IMAGE_TAG
            Value: latest
          - Name: DEPLOYMENT_TARGET
            Value: !Ref DeploymentTarget
          - Name: EKS_CLUSTER_NAME
            Value: !Sub ${ProjectName}-eks-cluster
          - Name: ECS_CLUSTER_NAME
            Value: !Sub ${ProjectName}-ecs-cluster
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:=latest}
            build:
              commands:
                - echo Build started on `date`
                - echo Building the Docker image...
                - cd backend
                - docker build -t $REPOSITORY_URI:latest .
                - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
            post_build:
              commands:
                - echo Build completed on `date`
                - echo Pushing the Docker images...
                - docker push $REPOSITORY_URI:latest
                - docker push $REPOSITORY_URI:$IMAGE_TAG
                - echo Writing image definitions file...
                - |
                  if [ "$DEPLOYMENT_TARGET" = "ECS" ]; then
                    printf '[{"name":"exam-platform-backend","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
                  else
                    # For EKS, create Kubernetes manifests
                    mkdir -p k8s
                    cat > k8s/backend-deployment.yaml << EOF
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: exam-platform-backend
                      namespace: default
                    spec:
                      replicas: 2
                      selector:
                        matchLabels:
                          app: exam-platform-backend
                      template:
                        metadata:
                          labels:
                            app: exam-platform-backend
                        spec:
                          containers:
                          - name: backend
                            image: $REPOSITORY_URI:$IMAGE_TAG
                            ports:
                            - containerPort: 8080
                            env:
                            - name: SPRING_PROFILES_ACTIVE
                              value: "prod"
                            resources:
                              requests:
                                memory: "512Mi"
                                cpu: "250m"
                              limits:
                                memory: "1Gi"
                                cpu: "500m"
                    ---
                    apiVersion: v1
                    kind: Service
                    metadata:
                      name: exam-platform-backend-service
                      namespace: default
                    spec:
                      selector:
                        app: exam-platform-backend
                      ports:
                      - port: 80
                        targetPort: 8080
                      type: LoadBalancer
                  EOF
                  fi
          artifacts:
            files:
              - imagedefinitions.json
              - k8s/**/*
            name: BackendBuildArtifact

  # CodeBuild Project for Frontend
  FrontendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-frontend-build
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: IMAGE_REPO_NAME
            Value: !Sub ${ProjectName}-frontend
          - Name: DEPLOYMENT_TARGET
            Value: !Ref DeploymentTarget
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:=latest}
            build:
              commands:
                - echo Build started on `date`
                - cd frontend
                - npm install
                - npm run build
                - echo Building Docker image for frontend...
                - |
                  cat > Dockerfile << EOF
                  FROM nginx:alpine
                  COPY build/ /usr/share/nginx/html/
                  COPY nginx.conf /etc/nginx/nginx.conf
                  EXPOSE 80
                  CMD ["nginx", "-g", "daemon off;"]
                  EOF
                - |
                  cat > nginx.conf << EOF
                  events {
                    worker_connections 1024;
                  }
                  http {
                    include /etc/nginx/mime.types;
                    default_type application/octet-stream;
                    server {
                      listen 80;
                      location / {
                        root /usr/share/nginx/html;
                        index index.html index.htm;
                        try_files \$uri \$uri/ /index.html;
                      }
                    }
                  }
                  EOF
                - docker build -t $REPOSITORY_URI:latest .
                - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
            post_build:
              commands:
                - echo Build completed on `date`
                - echo Pushing the Docker images...
                - docker push $REPOSITORY_URI:latest
                - docker push $REPOSITORY_URI:$IMAGE_TAG
                - |
                  if [ "$DEPLOYMENT_TARGET" = "EKS" ]; then
                    mkdir -p k8s
                    cat > k8s/frontend-deployment.yaml << EOF
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: exam-platform-frontend
                      namespace: default
                    spec:
                      replicas: 2
                      selector:
                        matchLabels:
                          app: exam-platform-frontend
                      template:
                        metadata:
                          labels:
                            app: exam-platform-frontend
                        spec:
                          containers:
                          - name: frontend
                            image: $REPOSITORY_URI:$IMAGE_TAG
                            ports:
                            - containerPort: 80
                            resources:
                              requests:
                                memory: "128Mi"
                                cpu: "100m"
                              limits:
                                memory: "256Mi"
                                cpu: "200m"
                    ---
                    apiVersion: v1
                    kind: Service
                    metadata:
                      name: exam-platform-frontend-service
                      namespace: default
                    spec:
                      selector:
                        app: exam-platform-frontend
                      ports:
                      - port: 80
                        targetPort: 80
                      type: LoadBalancer
                  EOF
                  fi
          artifacts:
            files:
              - k8s/**/*
            name: FrontendBuildArtifact

  # CodeBuild Project for EKS Deployment
  EKSDeployProject:
    Type: AWS::CodeBuild::Project
    Condition: IsEKSDeployment
    Properties:
      Name: !Sub ${ProjectName}-eks-deploy
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: EKS_CLUSTER_NAME
            Value: !Sub ${ProjectName}-eks-cluster
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Installing kubectl...
                - curl -o kubectl https://amazon-eks.s3.us-west-2.amazonaws.com/1.21.2/2021-07-05/bin/linux/amd64/kubectl
                - chmod +x ./kubectl
                - mv ./kubectl /usr/local/bin
                - echo Configuring kubectl...
                - aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name $EKS_CLUSTER_NAME
            build:
              commands:
                - echo Deploying to EKS...
                - kubectl apply -f k8s/backend-deployment.yaml
                - kubectl apply -f k8s/frontend-deployment.yaml
                - echo Waiting for deployments to be ready...
                - kubectl rollout status deployment/exam-platform-backend
                - kubectl rollout status deployment/exam-platform-frontend
            post_build:
              commands:
                - echo Deployment completed
                - kubectl get services

  # CodePipeline Service Role
  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:GetRepository
                  - codecommit:ListBranches
                  - codecommit:ListRepositories
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                Resource: '*'

  # CodePipeline
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactsBucket
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: '1'
              Configuration:
                RepositoryName: !GetAtt CodeRepository.Name
                BranchName: main
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Build
          Actions:
            - Name: BackendBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BackendBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BackendBuildOutput
              RunOrder: 1

            - Name: FrontendBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref FrontendBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: FrontendBuildOutput
              RunOrder: 1

        - Name: Deploy
          Actions:
            - !If
              - IsECSDeployment
              - Name: DeployBackendToECS
                ActionTypeId:
                  Category: Deploy
                  Owner: AWS
                  Provider: ECS
                  Version: '1'
                Configuration:
                  ClusterName: !Sub ${ProjectName}-ecs-cluster
                  ServiceName: !Sub ${ProjectName}-backend-service
                  FileName: imagedefinitions.json
                InputArtifacts:
                  - Name: BackendBuildOutput
                RunOrder: 1
              - Name: DeployToEKS
                ActionTypeId:
                  Category: Build
                  Owner: AWS
                  Provider: CodeBuild
                  Version: '1'
                Configuration:
                  ProjectName: !Ref EKSDeployProject
                InputArtifacts:
                  - Name: BackendBuildOutput
                  - Name: FrontendBuildOutput
                RunOrder: 1

  # CloudWatch Event Rule for automatic pipeline trigger
  PipelineTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Trigger pipeline on CodeCommit changes
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        resources:
          - !GetAtt CodeRepository.Arn
        detail:
          event:
            - referenceCreated
            - referenceUpdated
          referenceType:
            - branch
          referenceName:
            - main
      State: ENABLED
      Targets:
        - Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:pipeline/${Pipeline}
          Id: PipelineTrigger
          RoleArn: !GetAtt PipelineTriggerRole.Arn

  # Role for CloudWatch Events to trigger pipeline
  PipelineTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelineTriggerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:pipeline/${Pipeline}

Conditions:
  IsEKSDeployment: !Equals [!Ref DeploymentTarget, 'EKS']
  IsECSDeployment: !Equals [!Ref DeploymentTarget, 'ECS']

Outputs:
  CodeCommitRepositoryCloneURL:
    Description: CodeCommit Repository Clone URL
    Value: !GetAtt CodeRepository.CloneUrlHttp
    Export:
      Name: !Sub ${ProjectName}-repo-url

  PipelineName:
    Description: Name of the CodePipeline
    Value: !Ref Pipeline
    Export:
      Name: !Sub ${ProjectName}-pipeline-name

  BackendECRRepository:
    Description: Backend ECR Repository URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BackendECRRepository}
    Export:
      Name: !Sub ${ProjectName}-backend-ecr

  FrontendECRRepository:
    Description: Frontend ECR Repository URI
    Value: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${FrontendECRRepository}
    Export:
      Name: !Sub ${ProjectName}-frontend-ecr